<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bangalore Medical Finder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .skeleton {
      background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .chip-hospital { background-color: #fee2e2; color: #991b1b; }
    .chip-clinic { background-color: #dbeafe; color: #1e40af; }
    .chip-doctors { background-color: #dcfce7; color: #166534; }
    .chip-pharmacy { background-color: #fef3c7; color: #92400e; }
    .chip-dentist { background-color: #f3e8ff; color: #6b21a8; }
    .chip-unknown { background-color: #f3f4f6; color: #374151; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">
  <!-- Login screen -->
  <div id="loginScreen" class="max-w-md mx-auto px-4 py-12">
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
      <h1 class="text-2xl font-bold text-gray-900 mb-2">🏥 Bangalore Medical Finder</h1>
      <p class="text-sm text-gray-500 mb-4">Internal team access only.</p>
      <form id="loginForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Access password</label>
          <input id="passwordInput" type="password" required autocomplete="current-password" class="w-full rounded-lg border border-gray-300 bg-white py-3 px-3 text-base focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="Enter team password" />
        </div>
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3.5 px-4 rounded-lg text-base min-h-[48px]">Sign in</button>
        <p id="loginError" class="text-sm text-red-600 hidden"></p>
      </form>
    </div>
  </div>

  <!-- Main app (hidden until logged in) -->
  <div id="appShell" class="hidden max-w-3xl mx-auto px-4 py-6">
    <!-- Header -->
    <div class="mb-6">
      <h1 class="text-2xl font-bold text-gray-900">🏥 Bangalore Medical Finder</h1>
      <p class="text-sm text-gray-500 mt-1">Find hospitals, clinics, pharmacies &amp; dentists near you.</p>
    </div>

    <!-- Controls -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 mb-4 space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">City</label>
        <select id="citySelect" disabled class="w-full rounded-lg border-gray-300 bg-gray-100 text-gray-600 py-3 px-3 text-base">
          <option>Bangalore</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Area</label>
        <select id="areaSelect" class="w-full rounded-lg border border-gray-300 bg-white py-3 px-3 text-base focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
          <option value="" disabled selected>Select an area…</option>
        </select>
      </div>
      <button id="searchBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3.5 px-4 rounded-lg text-base transition-colors min-h-[48px]">
        Find Medical Centers
      </button>
    </div>

    <!-- Filter chips: sticky, between search and results -->
    <div class="sticky top-0 z-40 bg-gray-50/95 backdrop-blur-sm py-2 mb-4 -mx-4 px-4">
      <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Filter results</label>
      <div id="filterChips" class="flex flex-wrap gap-2">
        <button data-type="all" class="filter-chip px-3 py-1.5 rounded-full text-sm font-medium border border-gray-300 bg-gray-900 text-white">All</button>
        <button data-type="hospital" class="filter-chip px-3 py-1.5 rounded-full text-sm font-medium border border-gray-300 bg-white text-gray-700">🏥 Hospital</button>
        <button data-type="clinic" class="filter-chip px-3 py-1.5 rounded-full text-sm font-medium border border-gray-300 bg-white text-gray-700">🩺 Clinic</button>
        <button data-type="doctors" class="filter-chip px-3 py-1.5 rounded-full text-sm font-medium border border-gray-300 bg-white text-gray-700">👨‍⚕️ Doctors</button>
        <button data-type="pharmacy" class="filter-chip px-3 py-1.5 rounded-full text-sm font-medium border border-gray-300 bg-white text-gray-700">💊 Pharmacy</button>
        <button data-type="dentist" class="filter-chip px-3 py-1.5 rounded-full text-sm font-medium border border-gray-300 bg-white text-gray-700">🦷 Dentist</button>
      </div>
    </div>

    <!-- Loading -->
    <div id="loading" class="hidden mb-6">
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4">
        <div class="skeleton h-6 w-3/4 rounded mb-3"></div>
        <div class="skeleton h-4 w-1/2 rounded mb-2"></div>
        <div class="skeleton h-4 w-2/3 rounded"></div>
      </div>
    </div>

    <!-- Empty / Message -->
    <div id="message" class="hidden mb-6 text-center text-gray-500 text-base py-8"></div>

    <!-- Results -->
    <div id="results" class="space-y-4"></div>

    <!-- Back to top -->
    <button id="backToTop" class="hidden fixed bottom-4 right-4 bg-gray-900 text-white rounded-full p-3 shadow-lg z-50 min-w-[48px] min-h-[48px]" aria-label="Back to top">
      ↑
    </button>
  </div>

  <script>
    // --- Auth layer ---
    const SESSION_TOKEN = sessionStorage.getItem('medibrick_token');

    if (SESSION_TOKEN) {
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('appShell').classList.remove('hidden');
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('passwordInput').value;
      const errEl = document.getElementById('loginError');
      errEl.classList.add('hidden');
      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });
        if (!res.ok) {
          errEl.textContent = 'Wrong password.';
          errEl.classList.remove('hidden');
          return;
        }
        const data = await res.json();
        sessionStorage.setItem('medibrick_token', data.token);
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('appShell').classList.remove('hidden');
        loadAreas();
      } catch (err) {
        errEl.textContent = 'Sign in failed. Try again.';
        errEl.classList.remove('hidden');
      }
    });

    function authHeaders() {
      return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + sessionStorage.getItem('medibrick_token') };
    }

    const areaSelect = document.getElementById('areaSelect');
    const searchBtn = document.getElementById('searchBtn');
    const loading = document.getElementById('loading');
    const message = document.getElementById('message');
    const results = document.getElementById('results');
    const backToTop = document.getElementById('backToTop');

    let lastSearch = null;

    const typeEmoji = {
      hospital: '🏥',
      clinic: '🩺',
      doctors: '👨‍⚕️',
      pharmacy: '💊',
      dentist: '🦷',
    };

    const typeLabel = {
      hospital: 'Hospital',
      clinic: 'Clinic',
      doctors: 'Doctors',
      pharmacy: 'Pharmacy',
      dentist: 'Dentist',
    };

    let activeFilter = 'all';
    let lastResults = [];

    function setFilter(type) {
      activeFilter = type;
      document.querySelectorAll('.filter-chip').forEach(btn => {
        if (btn.dataset.type === type) {
          btn.classList.remove('bg-white', 'text-gray-700', 'border-gray-300');
          btn.classList.add('bg-gray-900', 'text-white', 'border-gray-900');
        } else {
          btn.classList.remove('bg-gray-900', 'text-white', 'border-gray-900');
          btn.classList.add('bg-white', 'text-gray-700', 'border-gray-300');
        }
      });
      renderResults();
    }

    document.getElementById('filterChips').addEventListener('click', (e) => {
      const btn = e.target.closest('.filter-chip');
      if (!btn) return;
      setFilter(btn.dataset.type);
      // Filter client-side from already-fetched results; no need to re-fetch
      renderResults();
    });

    async function loadAreas() {
      try {
        const res = await fetch('/areas');
        const data = await res.json();
        for (const area of data.areas) {
          const opt = document.createElement('option');
          opt.value = area;
          opt.textContent = area;
          areaSelect.appendChild(opt);
        }
      } catch (e) {
        console.error('Failed to load areas', e);
      }
    }

    function renderCard(item) {
      const chipClass = ['hospital','clinic','doctors','pharmacy','dentist'].includes(item.type) ? `chip-${item.type}` : 'chip-unknown';
      const emoji = typeEmoji[item.type] || '🏥';
      const label = typeLabel[item.type] || item.type;
      const googleUrl = `https://www.google.com/search?q=${encodeURIComponent(item.name + ' Bangalore')}`;

      return `
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4">
          <div class="flex items-start justify-between gap-3">
            <a href="${googleUrl}" target="_blank" rel="noopener" class="text-lg font-bold text-gray-900 leading-snug hover:text-blue-700 hover:underline">
              ${escapeHtml(item.name)}
            </a>
            <span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium whitespace-nowrap ${chipClass}">
              ${emoji} ${label}
            </span>
          </div>
        </div>
      `;
    }

    function updateFilterCounts() {
      const counts = {};
      for (const r of lastResults) {
        counts[r.type] = (counts[r.type] || 0) + 1;
      }
      document.querySelectorAll('.filter-chip').forEach(btn => {
        const type = btn.dataset.type;
        const count = type === 'all' ? lastResults.length : (counts[type] || 0);
        const baseText = type === 'all' ? 'All' : `${typeEmoji[type] || '🏥'} ${typeLabel[type] || type}`;
        btn.textContent = `${baseText} (${count})`;
      });
    }
      updateFilterCounts();

      const filtered = activeFilter === 'all'
        ? lastResults
        : lastResults.filter(r => r.type === activeFilter);

      if (!filtered.length && lastResults.length) {
        message.textContent = `No ${typeLabel[activeFilter] || activeFilter} found in this area.`;
        message.classList.remove('hidden');
        results.innerHTML = '';
        return;
      }

      if (!lastResults.length) {
        // keep existing empty-state message
        return;
      }

      message.classList.add('hidden');
      results.innerHTML = filtered.map(renderCard).join('');
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    async function doSearch() {
      const area = areaSelect.value;
      if (!area) {
        message.textContent = 'Please select an area first.';
        message.classList.remove('hidden');
        results.innerHTML = '';
        return;
      }

      lastSearch = area;
      loading.classList.remove('hidden');
      message.classList.add('hidden');
      results.innerHTML = '';
      searchBtn.disabled = true;
      searchBtn.textContent = 'Searching…';

      try {
        const res = await fetch('/search', {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify({ area }),
        });
        const data = await res.json();

        loading.classList.add('hidden');
        searchBtn.disabled = false;
        searchBtn.textContent = 'Find Medical Centers';

        if (res.status === 401) {
          sessionStorage.removeItem('medibrick_token');
          document.getElementById('loginScreen').classList.remove('hidden');
          document.getElementById('appShell').classList.add('hidden');
          return;
        }

        if (data.message) {
          message.textContent = data.message;
          message.classList.remove('hidden');
        }

        if (data.results && data.results.length) {
          lastResults = data.results;
          renderResults();
        }
      } catch (e) {
        loading.classList.add('hidden');
        searchBtn.disabled = false;
        searchBtn.textContent = 'Find Medical Centers';
        message.textContent = 'Something went wrong. Please try again.';
        message.classList.remove('hidden');
      }
    }

    searchBtn.addEventListener('click', doSearch);
    if (SESSION_TOKEN) loadAreas();

    // Back to top
    window.addEventListener('scroll', () => {
      if (window.scrollY > 400) {
        backToTop.classList.remove('hidden');
      } else {
        backToTop.classList.add('hidden');
      }
    });
    backToTop.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    loadAreas();
  </script>
</body>
</html>
