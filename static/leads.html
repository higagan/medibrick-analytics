<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediBrick Leads</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M50 88 L50 88 C25 70 8 50 8 32 C8 16 20 6 32 6 C40 6 46 10 50 16 C54 10 60 6 68 6 C80 6 92 16 92 32 C92 50 75 70 50 88 Z' fill='%23dc2626'/><text x='50' y='58' font-family='Arial,sans-serif' font-size='44' font-weight='900' fill='white' text-anchor='middle'>M</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .skeleton { background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">
  <div class="max-w-3xl mx-auto px-4 py-6">
    <!-- Header -->
    <div class="mb-6">
      <div class="flex items-center justify-between gap-3 mb-2">
        <div class="flex items-center gap-3">
          <svg viewBox="0 0 100 100" class="w-10 h-10 flex-shrink-0" aria-label="MediBrick logo">
            <path d="M50 88 L50 88 C25 70 8 50 8 32 C8 16 20 6 32 6 C40 6 46 10 50 16 C54 10 60 6 68 6 C80 6 92 16 92 32 C92 50 75 70 50 88 Z" fill="#dc2626"/>
            <text x="50" y="58" font-family="Arial,sans-serif" font-size="44" font-weight="900" fill="white" text-anchor="middle">M</text>
          </svg>
          <div>
            <h1 class="text-2xl font-bold text-gray-900">📋 Leads</h1>
            <p class="text-xs text-gray-500" id="leadsSubtitle">Loading...</p>
          </div>
        </div>
        <a href="/" class="text-sm text-blue-600 font-medium whitespace-nowrap">← Home</a>
        <a href="/analytics.html" class="text-sm text-blue-600 font-medium whitespace-nowrap">📊 Analytics →</a>
        <button id="refreshBtn" title="Run scraper on your Mac, then click to reload" class="ml-2 text-sm font-medium text-gray-600 hover:text-gray-900 whitespace-nowrap">🔄 Refresh</button>
      </div>
    </div>

    <!-- Filter chips: sticky -->
    <div class="sticky top-0 z-40 bg-gray-50/95 backdrop-blur-sm py-2 mb-4 -mx-4 px-4 border-b border-gray-200">
      <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Filter by role</label>
      <div id="filterChips" class="flex flex-wrap gap-2">
        <button data-role="all" class="filter-chip px-3 py-1.5 rounded-full text-sm font-medium border border-gray-300 bg-gray-900 text-white">All</button>
        <button data-role="doctor" class="filter-chip px-3 py-1.5 rounded-full text-sm font-medium border border-gray-300 bg-white text-gray-700">🩺 Doctor</button>
        <button data-role="rmo" class="filter-chip px-3 py-1.5 rounded-full text-sm font-medium border border-gray-300 bg-white text-gray-700">🏥 RMO</button>
        <button data-role="bams" class="filter-chip px-3 py-1.5 rounded-full text-sm font-medium border border-gray-300 bg-white text-gray-700">🌿 BAMS</button>
        <button data-role="bhms" class="filter-chip px-3 py-1.5 rounded-full text-sm font-medium border border-gray-300 bg-white text-gray-700">🌿 BHMS</button>
        <button data-role="specialist" class="filter-chip px-3 py-1.5 rounded-full text-sm font-medium border border-gray-300 bg-white text-gray-700">⭐ Specialist</button>
        <button data-role="locum" class="filter-chip px-3 py-1.5 rounded-full text-sm font-medium border border-gray-300 bg-white text-gray-700">📍 Locum</button>
        <button data-role="nurse" class="filter-chip px-3 py-1.5 rounded-full text-sm font-medium border border-gray-300 bg-white text-gray-700">💉 Nurse</button>
      </div>
      <div class="mt-3 grid grid-cols-2 gap-2">
        <select id="cityInput" class="rounded-lg border border-gray-300 bg-white py-2 px-3 text-sm">
          <option value="">All cities</option>
        </select>
        <select id="areaInput" class="rounded-lg border border-gray-300 bg-white py-2 px-3 text-sm" disabled>
          <option value="">All areas</option>
        </select>
      </div>
    </div>

    <!-- Loading -->
    <div id="loading" class="hidden mb-6">
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4">
        <div class="skeleton h-6 w-3/4 rounded mb-3"></div>
        <div class="skeleton h-4 w-1/2 rounded mb-2"></div>
        <div class="skeleton h-4 w-2/3 rounded"></div>
      </div>
    </div>

    <!-- Empty / Message -->
    <div id="message" class="hidden mb-6 text-center text-gray-500 text-base py-8"></div>

    <!-- Results -->
    <div id="results" class="space-y-4"></div>
  </div>

  <script>
    const filterChipsEl = document.getElementById('filterChips');
    const cityInput = document.getElementById('cityInput');
    const areaInput = document.getElementById('areaInput');
    const loading = document.getElementById('loading');
    const message = document.getElementById('message');
    const results = document.getElementById('results');
    const leadsSubtitle = document.getElementById('leadsSubtitle');

    let allLeads = [];
    let activeRole = 'all';

    function roleMatches(role, lead) {
      // Prefer the LLM's classification when present (more accurate than regex)
      const llmRole = lead.llm_data && lead.llm_data.role;
      if (llmRole) {
        if (role === 'all') return true;
        return llmRole === role;
      }
      // Fallback to regex for leads not yet enriched
      const haystack = ((lead.role || '') + ' ' + (lead.department || '')).toLowerCase();
      if (role === 'all') return true;
      if (role === 'doctor') return /\b(doctor|duty doctor|consultant|physician|specialist|surgeon|anesthetist|pathologist|radiologist|pediatrician|gynecologist|orthopedic|cardiologist|neurologist|dermatologist|ophthalmologist|mbbs|md |dnb|dm |mch)\b/.test(haystack);
      if (role === 'rmo') return /\b(rmo|resident medical officer|junior resident|senior resident|registrar|resident)\b/.test(haystack);
      if (role === 'bams') return /\b(bams|ayurveda|ayurvedic)\b/.test(haystack);
      if (role === 'bhms') return /\b(bhms|homeopathy|homeopathic)\b/.test(haystack);
      if (role === 'specialist') {
        // 'Specialist' alone is too broad (catches insurance 'Medical Evaluation
        // Specialist' at Plum Benefits, etc.). Require it to be the lead role
        // or paired with a medical keyword.
        const lead = haystack.trim();
        if (/^(specialist|consultant|consultant doctor|specialist doctor|senior consultant|junior consultant|specialist physician|consultant physician)\b/.test(lead)) return true;
        if (/\b(consultant|specialist)\b/.test(lead) && /\b(physician|mbbs|md|ms|dm|mch|dnb|doctor|surgeon|hospital|clinic)\b/.test(lead)) return true;
        return false;
      }
      if (role === 'locum') return /\b(locum|temporary|contract|walk[-\s]?in|urgent|immediate|flexible)\b/.test(haystack);
      if (role === 'nurse') return /\b(nurse|nursing|gnm|anm|bsc nursing|ot nurse|icu nurse)\b/.test(haystack);
      return false;
    }

    function formatDate(d) {
      if (!d) return '';
      const dt = new Date(d);
      if (isNaN(dt.getTime())) return d;
      const now = new Date();
      const diffDays = Math.floor((now - dt) / (1000 * 60 * 60 * 24));
      if (diffDays === 0) return 'Today';
      if (diffDays === 1) return 'Yesterday';
      if (diffDays < 7) return diffDays + ' days ago';
      if (diffDays < 30) return Math.floor(diffDays / 7) + ' weeks ago';
      return dt.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function deriveSource(urlStr) {
      if (!urlStr) return { label: 'Web', url: '' };
      try {
        const u = new URL(urlStr);
        const h = u.hostname.toLowerCase();
        if (h.includes('indeed')) return { label: 'Indeed', url: urlStr };
        if (h.includes('docthub')) return { label: 'DoctHub', url: urlStr };
        if (h.includes('drlogy')) return { label: 'DrLogy', url: urlStr };
        if (h.includes('foundit') || h.includes('monster')) return { label: 'Foundit', url: urlStr };
        if (h.includes('jobhai')) return { label: 'JobHai', url: urlStr };
        if (h.includes('manipal')) return { label: 'Manipal', url: urlStr };
        if (h.includes('fortis')) return { label: 'Fortis', url: urlStr };
        if (h.includes('apollo')) return { label: 'Apollo', url: urlStr };
        if (h.includes('linkedin')) return { label: 'LinkedIn', url: urlStr };
        if (h.includes('naukri')) return { label: 'Naukri', url: urlStr };
        if (h.includes('trakstar')) return { label: 'Trakstar', url: urlStr };
        const cleanHost = h.replace('www.', '').split('.')[0];
        return { label: cleanHost.charAt(0).toUpperCase() + cleanHost.slice(1), url: urlStr };
      } catch (e) {
        return { label: 'Source', url: urlStr };
      }
    }

    function renderCard(lead) {
      const hospitalRaw = (lead.hospital || 'Unknown Hospital').trim();
      const canonical = (lead.llm_data && lead.llm_data.hospital_canonical) || '';
      // Always prefer canonical when available; show raw in parens only if meaningfully different
      const canonicalLower = canonical.toLowerCase();
      const rawLower = hospitalRaw.toLowerCase();
      const showCanonical = canonical && canonicalLower !== rawLower;
      const showRawParens = showCanonical && !rawLower.includes(canonicalLower) && !canonicalLower.includes(rawLower);
      const hospital = showCanonical
        ? `${escapeHtml(canonical)}${showRawParens ? ` <span class="text-xs text-gray-400 font-normal">(${escapeHtml(hospitalRaw)})</span>` : ''}`
        : escapeHtml(hospitalRaw);
      // Prefer LLM-classified role for the badge; fall back to scraper's raw value.
      const llmRole = (lead.llm_data && lead.llm_data.role) || '';
      const role = escapeHtml(llmRole || lead.role || 'Medical Staff');
      // Prefer LLM-classified department; fall back to scraper's raw value.
      const llmDept = (lead.llm_data && lead.llm_data.department) || '';
      const deptRaw = (llmDept || (lead.department || '')).trim();
      const showDept = deptRaw && deptRaw.toLowerCase() !== 'general' && deptRaw.toLowerCase() !== 'other';
      const dept = escapeHtml(deptRaw);
      const llmSummary = (lead.llm_data && lead.llm_data.summary) || '';
      const city = escapeHtml(lead.city || '');
      const area = escapeHtml(lead.area || '');
      const salary = escapeHtml(lead.salary || '');
      const date = formatDate(lead.date_posted);
      const src = deriveSource(lead.source_url);

      const sourceBadge = src.url
        ? `<a href="${escapeHtml(src.url)}" target="_blank" rel="noopener" class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold bg-blue-100 text-blue-800 hover:bg-blue-200 transition-colors whitespace-nowrap">${escapeHtml(src.label)} ↗</a>`
        : `<span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium bg-gray-200 text-gray-700">${escapeHtml(src.label)}</span>`;

      const location = [area, city].filter(Boolean).join(', ');

      return `
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4">
          <div class="flex items-start justify-between gap-3 mb-2">
            <h2 class="text-lg font-bold text-gray-900 leading-snug flex-1 min-w-0" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${hospital}</h2>
            ${sourceBadge}
          </div>
          <div class="flex items-center gap-2 mb-2 flex-wrap">
            <span class="inline-flex items-center px-2.5 py-1 rounded text-xs font-semibold bg-indigo-100 text-indigo-800">${role}</span>
            ${showDept ? `<span class="text-sm text-gray-500">${dept}</span>` : ''}
          </div>
          ${location ? `<p class="text-sm text-gray-600">📍 ${location}</p>` : ''}
          ${salary ? `<p class="text-sm text-green-700 font-semibold mt-1">💰 ${salary}</p>` : ''}
          ${llmSummary ? `<p class="text-xs text-gray-500 italic mt-1">${escapeHtml(llmSummary)}</p>` : ''}
          ${date ? `<p class="text-xs text-gray-400 mt-2">${date}</p>` : ''}
        </div>
      `;
    }

    function updateSubtitle(filteredCount) {
      // Count only leads whose ORIGINAL post date (date_posted) is in the last 24h.
      // We don't fall back to created_at because that's when WE scraped, not
      // when the job was posted — the user explicitly asked for the post date.
      const now = Date.now();
      const dayAgo = now - 24 * 60 * 60 * 1000;
      const postedInLast24h = allLeads.filter(l => {
        if (!l.date_posted) return false;
        const t = new Date(l.date_posted).getTime();
        return !isNaN(t) && t >= dayAgo;
      }).length;
      let subtitle = `Showing ${filteredCount} lead${filteredCount === 1 ? '' : 's'}`;
      if (postedInLast24h > 0 && filteredCount === allLeads.length) {
        subtitle += ` • ${postedInLast24h} posted in last 24h`;
      }
      leadsSubtitle.textContent = subtitle;
    }

    function renderResults() {
      if (!allLeads.length) {
        message.textContent = 'No leads yet. Run the scraper on your laptop to populate.';
        message.classList.remove('hidden');
        results.innerHTML = '';
        updateSubtitle(0);
        return;
      }

      // Filter: exact match on selected city + area, plus role chip
      const cityFilter = (cityInput.value || '').trim();
      const areaFilter = (areaInput.value || '').trim();
      const filtered = allLeads.filter(l => {
        if (!roleMatches(activeRole, l)) return false;
        if (cityFilter && (l.city || '').trim() !== cityFilter) return false;
        if (areaFilter && (l.area || '').trim() !== areaFilter) return false;
        return true;
      });

      if (!filtered.length) {
        message.textContent = 'No leads match this filter. Try clearing one of the filters above.';
        message.classList.remove('hidden');
        results.innerHTML = '';
        updateSubtitle(0);
        return;
      }

      message.classList.add('hidden');
      results.innerHTML = filtered.map(renderCard).join('');
      updateSubtitle(filtered.length);
    }

    filterChipsEl.addEventListener('click', (e) => {
      const btn = e.target.closest('.filter-chip');
      if (!btn) return;
      activeRole = btn.dataset.role;
      document.querySelectorAll('.filter-chip').forEach(b => {
        if (b.dataset.role === activeRole) {
          b.classList.remove('bg-white', 'text-gray-700', 'border-gray-300');
          b.classList.add('bg-gray-900', 'text-white', 'border-gray-900');
        } else {
          b.classList.remove('bg-gray-900', 'text-white', 'border-gray-900');
          b.classList.add('bg-white', 'text-gray-700', 'border-gray-300');
        }
      });
      // "All" chip means no role filter — but keep city/area as user set them.
      // The dropdown counts below update to reflect the new role filter.
      // Re-populate dropdowns with counts scoped to the active role, then
      // re-render the results grid.
      populateDropdowns(allLeads);
      renderResults();
    });

    async function loadLeads() {
      loading.classList.remove('hidden');
      try {
        const params = new URLSearchParams();
        if (cityInput.value) params.append('city', cityInput.value);
        if (areaInput.value) params.append('area', areaInput.value);
        const url = '/leads' + (params.toString() ? '?' + params.toString() : '');
        const res = await fetch(url);
        const data = await res.json();
        allLeads = data.results || [];
        // Count leads whose original job-post date is in the last 24h
        // (not when we scraped them). Falls back to created_at if date_posted
        // is missing so the count is always meaningful.
        const now = Date.now();
        const dayAgo = now - 24 * 60 * 60 * 1000;
        const postedInLast24h = allLeads.filter(l => {
          const ts = l.date_posted || l.created_at;
          if (!ts) return false;
          const t = new Date(ts).getTime();
          return !isNaN(t) && t >= dayAgo;
        }).length;
        let subtitle = `Showing ${allLeads.length} lead${allLeads.length === 1 ? '' : 's'}`;
        if (postedInLast24h > 0) {
          subtitle += ` • ${postedInLast24h} posted in last 24h`;
        }
        leadsSubtitle.textContent = subtitle;
        // Populate city/area dropdowns with distinct values from this data
        populateDropdowns(allLeads);
      } catch (e) {
        message.textContent = 'Failed to load leads.';
        message.classList.remove('hidden');
      } finally {
        loading.classList.add('hidden');
        renderResults();
      }
    }

    function populateDropdowns(leads) {
      // Build a city -> { count, Map(area -> count) } from leads that match
      // the CURRENT role filter. Counts are dynamic — when the user picks
      // "BAMS", the area counts (e.g. "HSR Layout (3)") reflect only BAMS
      // leads in that area. Areas with 0 leads for the current role are
      // hidden so the dropdown never shows "no records" options.
      const byCity = new Map();
      for (const l of leads) {
        // Skip leads that don't match the active role filter, so the
        // dropdown counts always preview what the user would actually see.
        if (!roleMatches(activeRole, l)) continue;
        const c = (l.city || '').trim();
        if (!c) continue;
        if (!byCity.has(c)) byCity.set(c, { count: 0, areas: new Map() });
        byCity.get(c).count += 1;
        const a = (l.area || '').trim();
        if (a) byCity.get(c).areas.set(a, (byCity.get(c).areas.get(a) || 0) + 1);
      }
      // Save current selections
      const curCity = cityInput.value;
      const curArea = areaInput.value;
      // Rebuild city dropdown
      cityInput.innerHTML = '<option value="">All cities</option>';
      const cities = [...byCity.keys()].sort();
      for (const c of cities) {
        const opt = document.createElement('option');
        opt.value = c;
        opt.textContent = `${c} (${byCity.get(c).count})`;
        cityInput.appendChild(opt);
      }
      // Restore city selection if still valid for this role
      if (curCity && cities.includes(curCity)) cityInput.value = curCity;
      // Rebuild area dropdown for current city, sorted by count desc
      function rebuildAreas() {
        const sel = cityInput.value;
        const cityData = sel && byCity.has(sel) ? byCity.get(sel) : { areas: new Map() };
        const areas = [...cityData.areas.entries()]
          .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));
        areaInput.innerHTML = '<option value="">All areas</option>';
        for (const [a, n] of areas) {
          const opt = document.createElement('option');
          opt.value = a;
          opt.textContent = `${a} (${n})`;
          areaInput.appendChild(opt);
        }
        areaInput.disabled = areas.length === 0;
        // If the previously selected area no longer exists in this role/city
        // combo, clear the selection so the user doesn't get an empty result.
        if (curArea && areas.some(([a]) => a === curArea)) {
          areaInput.value = curArea;
        } else {
          areaInput.value = '';
        }
      }
      rebuildAreas();
      cityInput.onchange = () => {
        areaInput.value = '';
        rebuildAreas();
        debouncedRender();
      };
    }

    let debounce;
    function debouncedRender() {
      clearTimeout(debounce);
      debounce = setTimeout(renderResults, 150);
    }
    // <select> elements fire 'change', not 'input'
    cityInput.addEventListener('change', debouncedRender);
    areaInput.addEventListener('change', debouncedRender);

    document.getElementById('refreshBtn').addEventListener('click', async () => {
      const btn = document.getElementById('refreshBtn');
      const orig = btn.textContent;
      btn.textContent = '⏳ Refreshing...';
      btn.disabled = true;
      // /leads/refresh is a no-op on Vercel — it just reminds the user to run
      // ./update.sh on their Mac. We then reload the leads list (which
      // reflects the latest Supabase data).
      try {
        const token = localStorage.getItem('medibrick_token');
        if (token) {
          await fetch('/leads/refresh', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
            body: JSON.stringify({ city: cityInput.value || 'Bengaluru' }),
          }).catch(() => {});
        }
      } finally {
        await loadLeads();
        btn.textContent = '✅ Refreshed';
        setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 1500);
      }
    });

    loadLeads();
  </script>
</body>
</html>
